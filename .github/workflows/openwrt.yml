name: OpenWrt mode

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: |
          gofmt -w .
          git diff --exit-code
      - name: Test
        run: go test ./...
      - name: Build OpenWrt targets
        run: |
          for target in linux/amd64 linux/arm64 linux/arm linux/mips linux/mipsle; do
            GOOS=${target%/*} GOARCH=${target#*/} CGO_ENABLED=0 go build -trimpath -o /tmp/ddns-go-${target#*/} .
          done
